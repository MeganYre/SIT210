<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LED control — same API as Arduino</title>
  <style>
    :root {
      font-family: system-ui, Segoe UI, sans-serif;
      color: #1a1a1a;
      background: #f4f4f5;
    }
    body { max-width: 28rem; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; font-weight: 600; }
    .meta { font-size: 0.875rem; color: #52525b; margin-bottom: 1.25rem; }
    .meta strong { color: #18181b; }
    .hint { font-size: 0.8rem; color: #71717a; margin-top: 0.5rem; }
    .room {
      background: #fff;
      border-radius: 8px;
      padding: 1rem 1.1rem;
      margin-bottom: 0.75rem;
      box-shadow: 0 1px 2px rgba(0,0,0,.06);
    }
    .room h2 { font-size: 1rem; margin: 0 0 0.35rem; }
    .state { font-size: 0.8rem; margin: 0 0 0.75rem; font-weight: 500; }
    .state.on { color: #15803d; }
    .state.off { color: #71717a; }
    .state.wait { color: #a16207; }
    .toggle-led {
      font: inherit;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: 1px solid #d4d4d8;
      background: #fafafa;
      cursor: pointer;
      min-width: 7rem;
    }
    .toggle-led:hover { background: #f4f4f5; }
    .toggle-led:active { transform: scale(0.98); }
    .toggle-led:disabled { opacity: 0.5; cursor: not-allowed; }
    .toggle-led.is-on { border-color: #86efac; background: #ecfdf5; }
    #error { color: #b91c1c; font-size: 0.8rem; margin-top: 1rem; min-height: 1.2em; }
  </style>
</head>
<body>
  <h1>LED control panel</h1>
  <p class="meta">
    REST sync: <strong id="db-status">Starting…</strong>
  </p>
  <p class="hint">
    Uses the same URLs as your sketch:
    <code>GET /livingRoom.json</code> … and <code>PUT</code> with body <code>true</code> / <code>false</code>.
    No Firebase SDK — works from a saved file or a local server.
  </p>

  <section class="room" data-room="livingRoom">
    <h2>Living room</h2>
    <p class="state wait" id="state-livingRoom">…</p>
    <button type="button" class="toggle-led" data-toggle>Turn on</button>
  </section>

  <section class="room" data-room="bathroom">
    <h2>Bathroom</h2>
    <p class="state wait" id="state-bathroom">…</p>
    <button type="button" class="toggle-led" data-toggle>Turn on</button>
  </section>

  <section class="room" data-room="closet">
    <h2>Closet</h2>
    <p class="state wait" id="state-closet">…</p>
    <button type="button" class="toggle-led" data-toggle>Turn on</button>
  </section>

  <p id="error"></p>

  <script>
    (function () {
      var API = "https://sit210-a7994-default-rtdb.asia-southeast1.firebasedatabase.app";

      var errEl = document.getElementById("error");
      var statusEl = document.getElementById("db-status");

      function setError(msg) {
        errEl.textContent = msg || "";
      }

      function urlFor(room) {
        return API + "/" + encodeURIComponent(room) + ".json";
      }

      function parseBool(text) {
        return String(text).trim() === "true";
      }

      function refreshRoom(room, stateEl, btn) {
        return fetch(urlFor(room), { cache: "no-store" })
          .then(function (r) {
            if (!r.ok) throw new Error(room + " HTTP " + r.status);
            return r.text();
          })
          .then(function (text) {
            var on = parseBool(text);
            stateEl.textContent = on ? "ON (true)" : "OFF (false)";
            stateEl.className = "state " + (on ? "on" : "off");
            btn.textContent = on ? "Turn off" : "Turn on";
            btn.className = "toggle-led" + (on ? " is-on" : "");
            return on;
          });
      }

      function writeRoom(room, value) {
        return fetch(urlFor(room), {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: value ? "true" : "false",
          cache: "no-store"
        }).then(function (r) {
          if (!r.ok) throw new Error(room + " write HTTP " + r.status);
        });
      }

      function pollAll() {
        var rooms = document.querySelectorAll(".room");
        var chain = Promise.resolve();
        rooms.forEach(function (section) {
          var room = section.getAttribute("data-room");
          if (!room) return;
          var stateEl = document.getElementById("state-" + room);
          var btn = section.querySelector("[data-toggle]");
          chain = chain.then(function () {
            return refreshRoom(room, stateEl, btn);
          });
        });
        return chain
          .then(function () {
            statusEl.textContent = "OK (last poll " + new Date().toLocaleTimeString() + ")";
            setError("");
          })
          .catch(function (e) {
            statusEl.textContent = "Error";
            setError(String(e.message || e) + " — check Wi‑Fi, database rules, or try another browser.");
          });
      }

      document.querySelectorAll(".room").forEach(function (section) {
        var room = section.getAttribute("data-room");
        if (!room) return;
        var stateEl = document.getElementById("state-" + room);
        var btn = section.querySelector("[data-toggle]");

        btn.addEventListener("click", function () {
          btn.disabled = true;
          setError("");
          fetch(urlFor(room), { cache: "no-store" })
            .then(function (r) {
              return r.text();
            })
            .then(function (text) {
              var next = !parseBool(text);
              return writeRoom(room, next);
            })
            .then(function () {
              return refreshRoom(room, stateEl, btn);
            })
            .catch(function (e) {
              setError(String(e.message || e));
            })
            .then(function () {
              btn.disabled = false;
            });
        });
      });

      pollAll();
      setInterval(pollAll, 500);
    })();
  </script>
</body>
</html>
